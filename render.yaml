services:
  - type: web
    name: pathistics-api
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/api/Dockerfile
    envVars:
      # Non-sensitive variables can be hardcoded directly
      - key: DEBUG
        value: "False"
      - key: OSRM_API_URL
        value: "https://router.project-osrm.org"

      # Sensitive variables should be synced (Render will prompt for these in the dashboard)
      - key: ALLOWED_HOSTS
        sync: true
      - key: CORS_ALLOWED_ORIGINS
        sync: true
      - key: SECRET_KEY
        sync: true
      - key: DATABASE_URL
        sync: true
