name: "Unit Tests"

on:
  workflow_call:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv (Python Package Manager)
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true # Caches Python dependencies automatically

      - name: Install Backend Dependencies
        run: |
          cd apps/api
          uv pip install -r requirements.txt --system

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm" # Caches your node_modules automatically

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Global Monorepo Unit Tests
        env:
          # Global environment variables for test steps
          SECRET_KEY: "ci-test-secret-key"
          DATABASE_URL: "postgres://postgres:password@localhost:5432/test_db"
          DEBUG: "True"
        run: pnpm test:unit
