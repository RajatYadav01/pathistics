name: "Lint"

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - uses: actions/checkout@v6

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13" # Match your project's Python version

      # Set up uv and cache its managed dependencies
      - name: Set up uv (Python Package Manager)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      # Create the virtual environment and install dependencies using uv
      - name: Install Python dependencies
        run: |
          # Create the virtual environment
          uv venv apps/api/.venv

          # Change directory to the backend app
          cd apps/api

          # Install the project and its dependencies into the local .venv
          uv pip install -e .[dev] --python .venv

      # Set up pnpm (version comes from package.json's "packageManager")
      - uses: pnpm/action-setup@v6

      # Set up Node with pnpm cache
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      # Install all dependencies (frozen lockfile ensures exact versions)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run lint for all apps in parallel
      - name: Lint both frontend and backend
        run: pnpm lint

      # Generate lint report in JSON
      - name: Generate lint report
        run: pnpm lint:report

      # Upload lint report as artifact
      - name: Upload lint report
        uses: actions/upload-artifact@v7
        with:
          name: lint-report-${{ github.run_id }}
          path: |
            apps/**/lint-report.json
