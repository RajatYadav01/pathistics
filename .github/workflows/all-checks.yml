name: All Checks

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      # Exclude the following files from triggering CI unnecessarily
      - "!**/package.json"

  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "pnpm-workspace.yaml"

jobs:
  # Run lint workflow
  lint:
    uses: ./.github/workflows/lint.yml

  # Unit tests depend on lint
  unit-tests:
    needs: lint
    uses: ./.github/workflows/unit-tests.yml

  # Integration tests depend on lint
  integration-tests:
    needs: lint
    uses: ./.github/workflows/integration-tests.yml

  # E2E tests run only after unit and integration tests succeed
  e2e-tests:
    needs: [unit-tests, integration-tests]
    uses: ./.github/workflows/e2e-tests.yml
    with:
      node-version: "24"
      start-worker: true
    # Pass secrets if Playwright or backend requires them
    secrets: inherit
